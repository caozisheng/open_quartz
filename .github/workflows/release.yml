name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and upload
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Open Quartz ${{ github.ref_name }}'
          releaseBody: |
            ## Features

            - **Realtime rendering loop** — rAF-driven Host/Compositor architecture inspired by QC's `QCRenderer`. `PLAY / PAUSE / STOP` transport replaces legacy single-shot `RUN`.
            - **Time system** — Shadertoy-compatible builtin uniforms (`iTime`, `iTimeDelta`, `iFrame`, `iDate`, `iMouse`, `iResolution`) auto-injected when declared in shader. Per-node `iResolution` matches each shader's FBO dimensions.
            - **Renderer node** — explicit output viewer (QC's `QCView` equivalent). Green header, in-place or panel preview. No extra render pass — reads upstream FBO directly.
            - **Multi-renderer support** — each renderer has its own mirror canvas; GPU→GPU `drawImage` blit. Multiple renderers display simultaneously.
            - **Fullscreen live preview** — live canvas overlay with SAVE button for frame capture as PNG.
            - **Video input** — camera (`getUserMedia`) and file upload as `sampler2D` texture. Video dimensions propagate to downstream shader default size.
            - **Video file persistence** — Tauri: absolute file path via `convertFileSrc`. Web: blob URL with reload prompt.
            - **GPU-only output path** — no `readPixels` / `toDataURL` in realtime loop. All output stays on GPU via mirror canvas blit.
            - **ONNX realtime support** — async non-blocking inference in the realtime path (1–N frame latency).
            - **Builtin uniform badges** — `AUTO` badge on `iTime`, `iMouse`, etc. in PortInspector.
            - **Clock** — pause/resume/seek support with sliding window FPS.
            - **MouseState** — Shadertoy `iMouse` convention (origin bottom-left, z/w click state).

            ## Breaking Changes

            - **RUN button removed** — all rendering goes through `PLAY`.
            - **`isRunning` / `setRunning` removed from store** — replaced by `loopState` with `play()` / `pause()` / `resume()` / `stop()`.

            ## Fixes

            - Stop/play lifecycle: WebGL context preserved across cycles
            - Video pause/resume syncs `<video>` elements
            - Async video init triggers plan recompile
            - Shader `v_uv` redefinition stripped by compiler
            - WebGL feedback loop guard
            - Per-node `iResolution` fixes UV scaling on mixed-resolution graphs
            - `autoSize` respected for upstream-derived default size
          releaseDraft: false
          prerelease: true
